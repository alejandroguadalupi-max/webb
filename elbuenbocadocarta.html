<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#fffbf2" id="metaThemeColor" />
<title>Carta - El Buen Bocado</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">

<style>
:root {
  /* --- COLORES EL BUEN BOCADO --- */
  --brand-color: #a0715e; /* Terracota */
  --bg-body: #fffbf2;     /* Crema suave */
  --bg-card: #ffffff;
  --text-main: #3e2b26;   /* Café oscuro */
  --text-sec: #8d6e63;    /* Marrón suave */
  --border: #e6ddd0;
  
  --shadow-card: 0 4px 20px -5px rgba(62, 43, 38, 0.08);
  --shadow-float: 0 15px 35px -5px rgba(62, 43, 38, 0.25);
}

[data-theme="dark"] {
  --bg-body: #1e1b1a;
  --bg-card: #2d2420;
  --text-main: #f3e5dc;
  --text-sec: #d7ccc8;
  --border: #3e2b26;
  --shadow-card: 0 4px 20px -5px rgba(0,0,0,0.3);
}

/* EVITAR ZOOM EN DOBLE TOQUE */
html { touch-action: manipulation; }

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* CORRECCIÓN FONDO SUPERIOR */
html {
  background-color: var(--bg-body);
  transition: background-color 0.3s ease;
  height: 100%;
}

body {
  margin: 0; background: var(--bg-body); color: var(--text-main); 
  font-family: 'Outfit', sans-serif; transition: background 0.3s ease; 
  padding-bottom: 140px; -webkit-font-smoothing: antialiased;
  min-height: 100%;
}

/* --- HEADER --- */
.header {
  padding: 15px 20px; 
  display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 800; 
  background: rgba(255, 251, 242, 0.95);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  transition: background 0.3s ease, border-color 0.3s ease;
}

[data-theme="dark"] .header { 
  background: rgba(30, 27, 26, 0.95); 
  border-bottom: 1px solid #3e2b26;
}

.brand-area { display: flex; align-items: center; }

.brand-name { 
  font-size: 1.4rem; font-weight: 800; color: var(--text-main); 
  margin: 0; line-height: 1; text-transform: uppercase; letter-spacing: 1px; 
}

.header-right { display: flex; align-items: center; gap: 10px; }

.lang-badge {
    font-weight: 700; border: 1px solid var(--text-sec); 
    padding: 8px 12px; 
    border-radius: 50px; 
    font-size: 0.75rem; cursor: default; letter-spacing: 1px; opacity: 0.8;
    color: var(--text-main);
}

.theme-btn { 
  background: var(--bg-card); border: 1px solid var(--border); cursor: pointer; padding: 0; 
  color: var(--text-main); display: flex; align-items: center; justify-content: center;
  width: 38px; height: 38px; border-radius: 50%; font-size: 1.1rem; transition: transform 0.2s;
}
.theme-btn:active { transform: scale(0.9); }

/* --- CONTROLES --- */
.controls-container {
  position: sticky; top: 68px; z-index: 790; background: var(--bg-body);
  padding: 10px 0; border-bottom: 1px solid transparent; transition: background 0.3s ease;
}

.allergy-wrapper {
  padding: 0 20px 15px 20px;
}

.allergy-select {
  width: 100%;
  appearance: none; -webkit-appearance: none;
  background: var(--bg-card); border: 1px solid var(--border); 
  color: var(--text-main); font-size: 0.9rem; font-weight: 600;
  padding: 12px 16px; border-radius: 12px; cursor: pointer; outline: none;
  box-shadow: var(--shadow-card);
  text-align: center; 
  background-image: none !important;
}

.filters-scroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px; scrollbar-width: none; }
.filters-scroll::-webkit-scrollbar { display: none; }
.filter-pill {
  padding: 10px 20px; background: var(--bg-card); border: 1px solid var(--border); 
  border-radius: 50px; white-space: nowrap; font-size: 0.9rem; font-weight: 600; 
  color: var(--text-sec); cursor: pointer; transition: all 0.2s;
}
.filter-pill.active { color: #fff; background: var(--brand-color); border-color: var(--brand-color); box-shadow: 0 4px 12px -3px var(--brand-color); }

/* --- MENU LIST --- */
.menu-grid { display: flex; flex-direction: column; gap: 15px; padding: 10px 20px; max-width: 800px; margin: 0 auto; }
.dish-card {
  background: var(--bg-card); border-radius: 16px; padding: 16px;
  display: grid; grid-template-columns: 1fr auto; gap: 15px;
  box-shadow: var(--shadow-card); align-items: start; border: 1px solid var(--border);
}

.dish-card.sold-out {
  opacity: 0.6;
  background: rgba(0,0,0,0.02);
}

.dish-info { display: flex; flex-direction: column; gap: 5px; }

/* CORRECCIÓN: Título fluido para que baje de línea natural sin romper elementos internos */
.dish-name { 
  font-weight: 700; font-size: 1.05rem; line-height: 1.3; color: var(--text-main); margin-bottom: 4px; 
}

/* CORRECCIÓN: Descripción sin límite de líneas */
.dish-desc { 
  font-size: 0.85rem; color: var(--text-sec); line-height: 1.4; opacity: 0.9; 
}

.dish-price { font-weight: 700; font-size: 1rem; color: var(--brand-color); margin-top: 5px; }

.badge-sold-out {
  font-size: 0.65rem; background: #fee2e2; color: #dc2626; padding: 3px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
  display: inline-block; vertical-align: middle; margin-left: 6px;
}

/* CORRECCIÓN: Emojis agrupados con white-space: nowrap para que no se partan */
.allergy-emojis {
  font-size: 1.1rem;
  display: inline-block;
  white-space: nowrap;
  vertical-align: middle;
  margin-left: 6px;
}

.action-area { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-start; min-width: 90px; }
.btn-add-simple {
  background: rgba(160, 113, 94, 0.1); color: var(--brand-color); font-weight: 700; font-size: 0.9rem;
  padding: 8px 16px; border-radius: 8px; border: 1px solid var(--brand-color); cursor: pointer; width: 100%;
}
.qty-selector {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg-body); border: 1px solid var(--border); border-radius: 8px; padding: 3px; width: 100%;
}
.qty-selector button {
  width: 28px; height: 28px; border-radius: 6px; border: none; background: var(--bg-card); color: var(--text-main);
  font-weight: 700; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
}
.qty-selector button.plus { color: var(--brand-color); }
.qty-selector span { font-weight: 600; font-size: 0.95rem; }

/* --- CESTA FLOTANTE --- */
#cart-float {
  position: fixed; 
  bottom: calc(30px + env(safe-area-inset-bottom)); 
  left: 50%; 
  transform: translateX(-50%) translateY(200px) scale(0.9);
  background: var(--text-main); color: var(--bg-card); padding: 14px 24px; border-radius: 100px; 
  display: flex; align-items: center; gap: 12px; justify-content: center;
  box-shadow: var(--shadow-float); cursor: pointer; z-index: 1000; 
  transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
  font-weight: 600; font-size: 1rem; width: max-content;
}
#cart-float.visible { transform: translateX(-50%) translateY(0) scale(1); }
.badge-count { background: var(--brand-color); color: #fff; padding: 3px 9px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; }

/* --- MODAL (ORDER SHEET) --- */
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(62, 43, 38, 0.6); backdrop-filter: blur(4px);
  z-index: 2000; opacity: 0; pointer-events: none; transition: 0.3s; display: flex; justify-content: center; align-items: flex-end;
}
.overlay.open { opacity: 1; pointer-events: auto; }

.sheet {
  background: var(--bg-card); width: 100%; max-width: 600px; max-height: 85vh; border-radius: 24px 24px 0 0;
  padding: 25px; display: flex; flex-direction: column; transform: translateY(100%); transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
  box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
}
.overlay.open .sheet { transform: translateY(0); }

.sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
.sheet-title { margin: 0; font-size: 1.3rem; font-weight: 700; color: var(--brand-color); }
.close-small { cursor:pointer; padding:5px; font-size:1.5rem; color: var(--text-main); }

/* MENSAJE AVISO ORGANIZACIÓN */
.disclaimer-msg {
  font-size: 0.85rem;
  color: var(--text-main);
  background: rgba(160, 113, 94, 0.1);
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 15px;
  line-height: 1.4;
  text-align: left;
  border: 1px dashed var(--brand-color);
  opacity: 0.9;
}

.order-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
.order-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: var(--bg-body); border-radius: 12px; }
.order-name { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }

textarea.notes {
  width: 100%; padding: 15px; border-radius: 12px; background: var(--bg-body); border: 2px solid var(--border);
  color: var(--text-main); font-family: inherit; resize: none; outline: none; margin-bottom: 15px; font-size: 0.95rem;
}
textarea.notes:focus { border-color: var(--brand-color); background: var(--bg-card); }

.btn-action-wrapper { display: flex; flex-direction: column; gap: 10px; }
.btn-waiter {
  width: 100%; padding: 18px; border-radius: 16px; 
  background: var(--text-main); color: var(--bg-card); border: none; font-weight: 800; font-size: 1.1rem; cursor: pointer; 
  display: flex; align-items: center; justify-content: center; gap: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transform-origin: center; animation: pulse 2s infinite;
}
@keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.02);} 100% {transform: scale(1);} }

.clear-btn { background: transparent; border: none; color: var(--text-sec); text-decoration: underline; cursor: pointer; align-self: center; font-size: 0.9rem; margin-top: 5px;}

/* --- MODO CAMARERO (PANTALLA COMPLETA) --- */
.sheet.waiter-mode { 
  height: 100% !important; max-height: 100vh; border-radius: 0; z-index: 3000; padding-top: 60px; 
  background: #fff; color: #000;
}
.sheet.waiter-mode .disclaimer-msg { display: none; } /* Ocultar aviso en modo camarero */
.sheet.waiter-mode .order-item { 
  padding: 25px 5px; background: transparent; border-bottom: 2px solid #eee; border-radius: 0; 
}
.sheet.waiter-mode .order-name { 
  font-size: 1.8rem; font-weight: 800; line-height: 1.1; color: #000;
}
.sheet.waiter-mode .qty-display { 
  font-size: 2.2rem; font-weight: 900; color: var(--brand-color); margin-right: 25px; 
}

.waiter-note-box {
  background: #FFF8E1; border: 3px solid #FFD54F; color: #000;
  padding: 20px; margin: 20px 0; border-radius: 16px; font-size: 1.4rem;
  line-height: 1.4; font-weight: 500;
}

.waiter-note-label { 
  font-weight: 900; display: block; margin-bottom: 8px; 
  text-transform: uppercase; font-size: 0.9rem; color: #FFA000; letter-spacing: 1px;
}

#closeWaiterBtn {
  position: absolute; top: 20px; right: 20px; width: 50px; height: 50px; background: var(--brand-color); color: #fff;
  border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 1.5rem; cursor: pointer; z-index: 3001;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3); border: none; font-weight: bold;
}

/* --- MINIATURA DEL PLATO --- */
.dish-thumbnail {
  width: 65px;
  height: 65px;
  border-radius: 12px;
  object-fit: cover;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.2s;
  flex-shrink: 0; /* Evita que se encoja */
}
.dish-thumbnail:active { transform: scale(0.95); }

/* Ajustamos el layout de la tarjeta para que quepa la foto */
.dish-card {
  display: flex; /* Cambiamos grid por flex para mejor adaptación */
  align-items: center; /* Centramos verticalmente */
}
.dish-info {
  flex: 1; /* Ocupa todo el espacio disponible a la izquierda */
  min-width: 0; /* Evita que los textos muy largos rompan el diseño */
}

/* --- VISOR DE IMAGEN (MODAL) --- */
.image-modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px);
  z-index: 4000; opacity: 0; pointer-events: none; transition: 0.3s ease;
  display: flex; justify-content: center; align-items: center; padding: 20px;
}
.image-modal-overlay.open { opacity: 1; pointer-events: auto; }

.image-modal-content {
  max-width: 100%; max-height: 80vh; border-radius: 16px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
  transform: scale(0.9); transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
}
.image-modal-overlay.open .image-modal-content { transform: scale(1); }

.image-modal-close {
  position: absolute; top: 20px; right: 20px;
  background: rgba(255,255,255,0.2); color: white; border: none;
  width: 40px; height: 40px; border-radius: 50%; font-size: 1.5rem;
  cursor: pointer; display: flex; justify-content: center; align-items: center;
}
</style>
</head>

  <div class="header-right">
    <div class="lang-badge" id="langDisplay">ES</div>
    <button class="theme-btn" id="themeBtn">☀️</button>
  </div>
</header>

<div class="controls-container">
  
  <div class="allergy-wrapper">
    <select id="allergyFilter" class="allergy-select" onchange="render()">
      <option value="" id="opt-all">Todo (sin filtros)</option>
      <option value="gf" id="opt-gf">Ocultar platos con gluten</option>
      <option value="lf" id="opt-lf">Ocultar platos con lactosa</option>
      <option value="nuts" id="opt-nuts">Ocultar platos con frutos secos</option>
    </select>
  </div>

  <div class="filters-scroll">
    <button class="filter-pill active" onclick="filter('bebidas')" id="f-drk">Bebidas</button>

    <button class="filter-pill" onclick="filter('principales')" id="f-main">Principales</button>
    <button class="filter-pill" onclick="filter('postres')" id="f-des">Postres</button>
  </div>

</div>

<div class="menu-grid" id="menuContainer"></div>

<div id="cart-float" onclick="openSheet()">

</div>

<div class="overlay" id="overlay" onclick="if(event.target===this) closeSheet()">
  <button id="closeWaiterBtn" onclick="exitWaiterMode()">✕</button>

  <div class="sheet" id="orderSheet">
    <div class="sheet-header">
      <h3 class="sheet-title" id="modalTitle">Tu Pedido</h3>
    </div>
    
    <div id="disclaimerText" class="disclaimer-msg"></div>
    
    <div class="order-list" id="orderList"></div>

    <div id="notesArea">
      <textarea class="notes" id="notesField" oninput="saveNotes()"></textarea>
    </div>
    
    <div id="waiterNotesDisplay" style="display:none;"></div>

    <div class="btn-action-wrapper">
      <button class="btn-waiter" id="btnShowWaiter" style="display:none;" onclick="enterWaiterMode()">
        <span id="btnWaiterText">🗣️ Mostrar pedido al camarero en español</span>
      </button>
      
      <button onclick="clearCart()" class="clear-btn" id="clearTxt">Borrar todo</button>
    </div>
  </div>
</div>
<div class="image-modal-overlay" id="imageModal" onclick="closeImage()">
  <button class="image-modal-close">✕</button>
  <img src="" id="fullSizeImage" class="image-modal-content" onclick="event.stopPropagation()">
</div>

/* --- TRADUCCIONES UI COMPLETAS CORREGIDAS --- */

/* --- ESTADO --- */

let lang = 'es';
let currentMenu = [];
let isFetching = true; // <--- NUEVA VARIABLE: Indica si estamos descargando por primera vez

/* --- INIT --- */
function init() {
  const params = new URLSearchParams(window.location.search);
  
  let savedTheme = params.get('theme') || localStorage.getItem('theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);
  
  const metaTheme = document.getElementById('metaThemeColor');
  if(savedTheme === 'dark') metaTheme.setAttribute('content', '#1e1b1a');
  else metaTheme.setAttribute('content', '#fffbf2'); 

  document.getElementById('themeBtn').innerText = savedTheme === 'dark' ? '🌙' : '☀️';
  
  const urlLang = params.get('lang');
  const browserLang = navigator.language.slice(0,2);
  let detectedLang = urlLang || localStorage.getItem('userLang') || browserLang;
  
  const supportedLangs = ['es','en','de','fr','it'];
  lang = supportedLangs.includes(detectedLang) ? detectedLang : 'es';
  
  try { localStorage.setItem('userLang', lang); } catch (e) {}
  document.getElementById('langDisplay').innerText = lang.toUpperCase();

  loadCart();
  translateUI();
  
  // 1. Cargar el menú guardado en el móvil (Carga Instantánea)
  loadMenuFromCache();
  
  // 2. Pintar la pantalla de inmediato con lo que tengamos
  filter('bebidas'); 
  updateFloat();

  // 3. Buscar datos nuevos en Supabase en segundo plano
  loadMenuFromDB();
}

/* --- MEMORIA CACHÉ --- */
function loadMenuFromCache() {
  try {
    const cachedMenu = localStorage.getItem('menu_cache_elbuenbocado');
    if (cachedMenu) {
      currentMenu = JSON.parse(cachedMenu);
      isFetching = false; // Si hay caché, ya tenemos platos, no hace falta esqueleto
    }
  } catch(e) {
    console.log("No hay caché previo");
  }
}

/* --- SUPABASE (Carga en Segundo Plano) --- */
async function loadMenuFromDB() {

  const slugValido = "el-buen-bocado"; 

  const { data, error } = await miSupabase
    .from('platos')
    .select('*')
    .eq('slug', slugValido)
    .order('orden', { ascending: true }); 

  isFetching = false; // Ya terminamos de contactar con la base de datos

  if (error) {
    console.error("Error en Supabase:", error.message);
    render(); // Forzamos pintar la pantalla (se mostrará vacía si falló)
    return;
  }

  if (data && data.length > 0) {
    currentMenu = data.map(p => ({
      id: p.id,
      cat: p.categoria || 'bebidas',
      tags: p.tags || [],
      price: Number(p.precio) || 0,
      name: p.nombre || { es: "Sin nombre" },
      desc: p.descripcion || { es: "" },
      disponible: p.disponible !== false,
      imagen: p.imagen || null // <--- AQUÍ LEEMOS LA FOTO DE SUPABASE
    }));
    
    // 👇 ¡AÑADE ESTAS DOS LÍNEAS QUE FALTABAN! 👇
    localStorage.setItem('menu_cache_elbuenbocado', JSON.stringify(currentMenu));
    render();
  }
}

/* --- RENDERIZADO DEL MENU --- */
function render() {
  const container = document.getElementById('menuContainer');
  container.innerHTML = '';
  
  // 1. PANTALLA DE CARGA (SKELETON) - Solo si es primera visita y está descargando
  if (isFetching && currentMenu.length === 0) {
    container.innerHTML = `
      <div class="dish-card" style="pointer-events:none;">
        <div class="dish-info" style="gap:8px;">
          <div style="height:16px; width:70%; background:var(--border); border-radius:6px; animation: pulse 1.5s infinite; opacity:0.6"></div>
          <div style="height:12px; width:90%; background:var(--border); border-radius:6px; animation: pulse 1.5s infinite; opacity:0.4"></div>
          <div style="height:12px; width:50%; background:var(--border); border-radius:6px; animation: pulse 1.5s infinite; opacity:0.4"></div>
          <div style="height:16px; width:25%; background:var(--border); border-radius:6px; animation: pulse 1.5s infinite; margin-top:5px; opacity:0.8"></div>
        </div>
        <div style="width:70px; height:35px; background:var(--border); border-radius:8px; animation: pulse 1.5s infinite; opacity:0.5"></div>
      </div>
      <div class="dish-card" style="pointer-events:none;">
        <div class="dish-info" style="gap:8px;">
          <div style="height:16px; width:50%; background:var(--border); border-radius:6px; animation: pulse 1.5s infinite; opacity:0.6"></div>
          <div style="height:12px; width:80%; background:var(--border); border-radius:6px; animation: pulse 1.5s infinite; opacity:0.4"></div>
          <div style="height:16px; width:25%; background:var(--border); border-radius:6px; animation: pulse 1.5s infinite; margin-top:5px; opacity:0.8"></div>
        </div>
        <div style="width:70px; height:35px; background:var(--border); border-radius:8px; animation: pulse 1.5s infinite; opacity:0.5"></div>
      </div>
    `;
    return; // Paramos aquí hasta que Supabase devuelva los datos de verdad
  }

  // 2. RENDERIZADO NORMAL (Cuando ya hay datos)
  const allergyFilter = document.getElementById('allergyFilter').value;
  const t = uiDict[lang] || uiDict['es'];
  const addBtnText = t.add || "Añadir";
  const soldOutText = t.soldout || "Agotado";

  const items = currentMenu.filter(item => {
    if(item.cat !== activeCategory) return false;
    if(allergyFilter === 'gf' && item.tags && item.tags.includes('gluten')) return false;
    if(allergyFilter === 'lf' && item.tags && item.tags.includes('lactosa')) return false;
    if(allergyFilter === 'nuts' && item.tags && item.tags.includes('frutos_secos')) return false;
    return true; 
  });

  if (items.length === 0) {
     container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-sec); opacity:0.7">No hay platos que cumplan tu selección en esta categoría.</div>`;
  }

  items.forEach(p => {
    const qty = cart[p.id] || 0;
    const pName = (p.name && p.name[lang]) ? p.name[lang] : (p.name && p.name['es'] ? p.name['es'] : "Plato");
    const pDesc = (p.desc && p.desc[lang]) ? p.desc[lang] : (p.desc && p.desc['es'] ? p.desc['es'] : "");
    const badgeHTML = p.disponible ? '' : `<span class="badge-sold-out">${soldOutText}</span>`;
    const cardClass = p.disponible ? 'dish-card' : 'dish-card sold-out';

    let allergyIconsHTML = '';
    if (p.tags && p.tags.length > 0) {
      const allergyDict = { 'gluten': '🍞', 'lactosa': '🥛', 'frutos_secos': '🥜' };
      const icons = p.tags.map(tag => allergyDict[tag]).filter(Boolean).join(' ');
      if (icons) {
        allergyIconsHTML = `<span class="allergy-emojis">${icons}</span>`;
      }
    }

    let controlHTML = '';
    if(p.disponible) {
        controlHTML = qty === 0 
          ? `<button class="btn-add-simple" onclick="add(${p.id})">${addBtnText}</button>`
          : `<div class="qty-selector"><button onclick="remove(${p.id})">-</button><span>${qty}</span><button class="plus" onclick="add(${p.id})">+</button></div>`;
    }

    // --- NUEVO: Construimos la miniatura de la imagen si existe ---
    let imgHTML = '';
    if (p.imagen) {
        imgHTML = `<img src="${p.imagen}" class="dish-thumbnail" onclick="openImage('${p.imagen}')" alt="Foto de ${pName}">`;
    }

    container.innerHTML += `
      <div class="${cardClass}">
        <div class="dish-info">
          <div class="dish-name">${pName} ${allergyIconsHTML} ${badgeHTML}</div>
          <div class="dish-desc">${pDesc}</div>
          <div class="dish-price">${p.price.toFixed(2)}€</div>
        </div>
        ${imgHTML} <div class="action-area">${controlHTML}</div>
      </div>
    `;
  });
}

function filter(cat) {
  activeCategory = cat;
  updateFilterUI();
  render();
}

function updateFilterUI() {
  document.querySelectorAll('.filter-pill').forEach(el => el.classList.remove('active'));
  const map = { 'bebidas':'f-drk', 'entrantes':'f-ent', 'principales':'f-main', 'postres':'f-des' };
  if(map[activeCategory]) document.getElementById(map[activeCategory]).classList.add('active');
}

/* --- FUNCIONES DEL CARRITO --- */
function add(id) { 
  cart[id] = (cart[id] || 0) + 1; 
  saveCart(); render(); updateFloat(); 
  if(document.querySelector('.overlay.open')) renderList(); 
}

function remove(id) { 
  if(cart[id]) { 
    cart[id]--; 
    if(cart[id] <= 0) delete cart[id]; 
  } 
  saveCart(); render(); updateFloat(); 
  if(document.querySelector('.overlay.open')) renderList(); 
}

function updateFloat() {
  const count = Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('countBadge').innerText = count;
  const btn = document.getElementById('cart-float');
  count > 0 ? btn.classList.add('visible') : btn.classList.remove('visible');
}

function openSheet() { 
  document.getElementById('overlay').classList.add('open'); 
  const waiterBtn = document.getElementById('btnShowWaiter');
  if (lang !== 'es') waiterBtn.style.display = 'flex';
  else waiterBtn.style.display = 'none';
  renderList();
}

function closeSheet() { 
  exitWaiterMode();
  document.getElementById('overlay').classList.remove('open'); 
}

function renderList() {
  const list = document.getElementById('orderList');
  list.innerHTML = '';
  
  const isWaiter = document.body.classList.contains('waiter-active');
  const displayLang = isWaiter ? 'es' : lang;

  if(Object.keys(cart).length === 0) {
    list.innerHTML = `<div style="text-align:center; padding:30px; opacity:0.6">Tu lista está vacía</div>`;
    if(!isWaiter) setTimeout(closeSheet, 1000); 
    return;
  }

  let items = Object.keys(cart).map(id => currentMenu.find(i => i.id == id)).filter(x=>x);
  
  items.sort((a, b) => {
     const order = { 'bebidas': 1, 'entrantes': 2, 'principales': 3, 'postres': 4 };
     return (order[a.cat] || 99) - (order[b.cat] || 99);
  });

  items.forEach(p => {
    const qty = cart[p.id];
    const pName = (p.name && p.name[displayLang]) ? p.name[displayLang] : (p.name && p.name['es'] ? p.name['es'] : "Plato");
    
    if(isWaiter) {
      list.innerHTML += `
        <div class="order-item">
          <div style="display:flex; align-items:flex-start">
             <span class="qty-display">${qty}x</span>
             <span class="order-name">${pName}</span>
          </div>
        </div>`;
    } else {
      list.innerHTML += `
        <div class="order-item">
          <span class="order-name" style="flex:1">${pName}</span>
          <div class="qty-selector" style="width:100px;">
            <button onclick="remove(${p.id})">-</button><span>${qty}</span><button class="plus" onclick="add(${p.id})">+</button>
          </div>
        </div>`;
    }
  });
}

async function enterWaiterMode() {
  document.body.classList.add('waiter-active');
  document.getElementById('orderSheet').classList.add('waiter-mode');
  
  document.getElementById('btnShowWaiter').style.display = 'none';
  document.getElementById('notesArea').style.display = 'none';
  document.getElementById('clearTxt').style.display = 'none';
  
  const userCloseBtn = document.getElementById('userCloseBtn');
  if(userCloseBtn) userCloseBtn.style.display = 'none'; 
  
  document.getElementById('modalTitle').style.display = 'none';
  document.getElementById('closeWaiterBtn').style.display = 'flex'; 
  
  const notes = document.getElementById('notesField').value;
  const waiterNotesDisplay = document.getElementById('waiterNotesDisplay');
  
  if (notes && notes.trim() !== "") {
    waiterNotesDisplay.style.display = 'block';
    waiterNotesDisplay.innerHTML = `<div class="waiter-note-box">Traducido comentario... ⏳</div>`;
    
    try {
        const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(notes)}&langpair=${lang}|es`);
        const data = await res.json();
        let translatedText = notes;
        if (data.responseData && data.responseData.translatedText) {
            translatedText = data.responseData.translatedText;
        }
        waiterNotesDisplay.innerHTML = `
          <div class="waiter-note-box">
            <span class="waiter-note-label">📝 NOTA DEL CLIENTE:</span>
            "${translatedText}"
          </div>
        `;
    } catch (err) {
        waiterNotesDisplay.innerHTML = `<div class="waiter-note-box">"${notes}"</div>`;
    }
  } else {
    waiterNotesDisplay.style.display = 'none';
  }
  
  renderList(); 
}

function exitWaiterMode() {
  document.body.classList.remove('waiter-active');
  document.getElementById('orderSheet').classList.remove('waiter-mode');
  
  document.getElementById('closeWaiterBtn').style.display = 'none';
  document.getElementById('waiterNotesDisplay').style.display = 'none';
  
  document.getElementById('notesArea').style.display = 'block';
  document.getElementById('clearTxt').style.display = 'block';
  
  const userCloseBtn = document.getElementById('userCloseBtn');
  if(userCloseBtn) userCloseBtn.style.display = 'block';
  
  document.getElementById('modalTitle').style.display = 'block';

  if(lang !== 'es') document.getElementById('btnShowWaiter').style.display = 'flex';

  renderList();
}

function saveCart() { try { localStorage.setItem('demo_cart', JSON.stringify(cart)); } catch(e){} }
function loadCart() { try { const s = localStorage.getItem('demo_cart'); if(s) cart = JSON.parse(s); } catch(e) {} }
function saveNotes() { try { localStorage.setItem('demo_notes', document.getElementById('notesField').value); } catch(e){} }
function clearCart() { cart={}; saveCart(); render(); updateFloat(); closeSheet(); }

function translateUI() {
  const t = uiDict[lang] || uiDict['es'];
  document.getElementById('brandNameDisplay').innerText = t.pageTitle;
  document.getElementById('f-ent').innerText = t.ent;
  document.getElementById('f-main').innerText = t.main;
  document.getElementById('f-des').innerText = t.des;
  document.getElementById('f-drk').innerText = t.drk;
  document.getElementById('btnText').innerText = t.btn;
  document.getElementById('modalTitle').innerText = t.title;
  document.getElementById('clearTxt').innerText = t.clear;
  document.getElementById('notesField').placeholder = t.place;
  document.getElementById('opt-all').innerText = t.all;
  document.getElementById('opt-gf').innerText = t.gf;
  document.getElementById('opt-lf').innerText = t.lf;
  document.getElementById('opt-nuts').innerText = t.nuts;
  document.getElementById('disclaimerText').innerText = t.disclaimer; 
  
  const waiterSpan = document.getElementById('btnWaiterText');
  if(waiterSpan) waiterSpan.innerText = "🗣️ " + t.trans;
}

const themeBtn = document.getElementById('themeBtn');
themeBtn.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  themeBtn.innerHTML = next === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', next);
  
  const metaTheme = document.getElementById('metaThemeColor');
  if(next === 'dark') metaTheme.setAttribute('content', '#1e1b1a');
  else metaTheme.setAttribute('content', '#fffbf2'); 
});
/* --- FUNCIONES DEL VISOR DE IMÁGENES --- */
function openImage(url) {
  document.getElementById('fullSizeImage').src = url;
  document.getElementById('imageModal').classList.add('open');
}

function closeImage() {
  document.getElementById('imageModal').classList.remove('open');
}

init();
</script>
