<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PataMig</title>
    <meta name="theme-color" content="#eee9d1" id="theme-meta">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Edu+NSW+ACT+Cursive:wght@400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        
        html {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            min-height: 100dvh;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            
            background-color: #eee9d1;
            color: #eee9d1;

            transition: background-color 0.3s, color 0.3s;
        }


        #logo {
            width: 60%;
            border-radius: 0.75rem;
        }

        #bienvenido {
            color: rgb(233, 148, 30);
            font-size: 30px;
        }


        #btn-ver-carta, #btn-valorar-experiencia {
            text-align: center;
            text-decoration: None;
            padding: 15px 25px;  /*espacio arriba y abajo e izq y der*/
            color: white;
            border-radius: 15px;
            background-color: #7db659;
            font-size: 1.25rem;
            font-weight: bold;
            width: 20rem;
        }

        #desplegable-idiomas {
            font-size: 1.25rem;
            border-radius: 1.5rem;
            color: grey;
            padding: 6px 10px;
            appearance: none;
            border: 3px solid orange;
        }

        #btn-modo {
            position:fixed;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            border-radius: 1.5rem;
            padding: 5px 5px;
            border-color: #7db659;
        }

        #siguenos-redes {
            color: orange;
            font-family: Oswald;
        }

        #instagram {
            width: 3rem;
        }

        #tiktok {
            width: 3rem;
        }

    </style>

</head>
<body>
        <img src = "img/PataMig.png" id = "logo" alt = "Logo restaurante">
        <h3 id = "bienvenido">¡Bienvenido!</h3>

        <a href = "pataMigcarta.html" id = "btn-ver-carta">Ver la carta</a>
        <br>
        <a href = "pataMigvalorarExperiencia.html" id = "btn-valorar-experiencia">Valorar experiencia</a>
        
        <br><br>
        <select id = "desplegable-idiomas">
            <option value = "es">Español</option>
            <option value = "en">English</option>
            <option value = "fr">Français</option>
            <option value = "de">Deutsch</option>
            <option value = "it">Italiano</option>
        </select>
        <h3 id = "siguenos-redes">Síguenos en redes sociales</h3>
        
        <div id = "iconos-redes">
            <img src = "img/instagram.png" id = "instagram">
            <img src = "img/tiktok.png" id = "tiktok">
        </div>

    <button id = "btn-modo">☀️</button>

</body>

<script>
    const btnModo = document.getElementById("btn-modo");
const themeMeta = document.getElementById("theme-meta");

let oscuro = false;

btnModo.addEventListener("click", () => {
    oscuro = !oscuro;

    if (oscuro) {
        // 🌙 MODO OSCURO
        document.body.style.backgroundColor = "#1c1c1c";
        document.body.style.color = "white";

        document.querySelector("#bienvenido").style.color = "white";
        document.querySelector("#siguenos-redes").style.color = "white";

        btnModo.textContent = "🌙";

        // 🔥 barra navegador
        themeMeta.setAttribute("content", "#1c1c1c");

    } else {
        // ☀️ MODO CLARO
        document.body.style.backgroundColor = "#eee9d1";
        document.body.style.color = "black";

        document.querySelector("#bienvenido").style.color = "orange";
        document.querySelector("#siguenos-redes").style.color = "orange";

        btnModo.textContent = "☀️";

        // 🔥 barra navegador
        themeMeta.setAttribute("content", "#eee9d1");
    }
});

</script>

</script>


</html>
